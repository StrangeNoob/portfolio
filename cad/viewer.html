<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js" integrity="sha384-Ftcjj/GNLxPvzNDftO/oryXB9aGxsGZY9JGqsXG0uUKgQDl9RfDgsx9NJ/4IVNPe" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #1c1f22; }
    model-viewer { width: 1200px; height: 900px; }
  </style>
</head>
<body>
  <model-viewer
    id="mv"
    src=""
    camera-orbit="35deg 70deg 110%"
    exposure="1.1"
    shadow-intensity="0.6"
    interaction-prompt="none"
  ></model-viewer>
  <script>
    const mv = document.getElementById('mv');
    const params = new URLSearchParams(location.search);
    mv.src = params.get('src') || 'crt_terminal.glb';
    if (params.get('orbit')) mv.cameraOrbit = params.get('orbit');
    if (params.get('bg')) document.body.style.background = params.get('bg');
    mv.addEventListener('load', () => { document.title = 'LOADED'; });
    mv.addEventListener('error', (e) => { document.title = 'ERROR'; console.error(e); });
  </script>
</body>
</html>
